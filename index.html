<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDC 自动领取 DApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }
    .container { max-width: 500px; margin: 0 auto; }
    
    .header { text-align: center; margin-bottom: 28px; }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .title-row span { font-size: 28px; color: #00d4ff; font-weight: 700; letter-spacing: 2px; }
    .title-row svg { vertical-align: middle; }
    .sub-title {
      font-size: 16px;
      color: #22c55e;
      margin-top: 10px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    
    .card {
      background: rgba(30, 41, 59, 0.8);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }
    .card-title {
      font-size: 14px;
      font-weight: bold;
      color: #00d4ff;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn {
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      color: #000;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      width: 100%;
      transition: all 0.2s;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3); }
    .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: #fff; }
    .btn-secondary { background: rgba(71, 85, 105, 0.5); color: #fff; }
    .btn-success { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: #fff; }
    
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .info-box {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .info-box label { display: block; font-size: 10px; color: #64748b; margin-bottom: 3px; }
    .info-box .value { font-size: 12px; color: #00d4ff; font-family: monospace; }
    
    .status-table {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      overflow: hidden;
    }
    .status-row {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .status-row:last-child { border-bottom: none; }
    .status-row .icon { width: 24px; font-size: 14px; }
    .status-row .name { flex: 1; font-size: 12px; color: #94a3b8; }
    .status-row .status { font-size: 12px; font-weight: bold; }
    .status-row .status.success { color: #22c55e; }
    .status-row .status.warning { color: #fbbf24; }
    .status-row .status.error { color: #ef4444; }
    
    .action-row { display: flex; gap: 8px; margin-top: 12px; }
    .action-row .btn { flex: 1; width: auto; margin-top: 0; }
    
    .auto-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      background: rgba(34, 197, 94, 0.15);
      border: 2px solid #22c55e;
    }
    .auto-indicator .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .auto-indicator span { font-size: 14px; font-weight: bold; color: #22c55e; }
    
    .log-list { margin-top: 10px; max-height: 100px; overflow-y: auto; font-size: 11px; }
    .log-item { padding: 6px 8px; border-radius: 4px; margin-bottom: 4px; background: rgba(0, 0, 0, 0.2); color: #94a3b8; }
    
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 12px;
      font-family: monospace;
      margin-top: 8px;
    }
    input:focus { outline: none; border-color: #00d4ff; }
    
    .warning-bar { background: rgba(251, 191, 36, 0.2); color: #fbbf24; padding: 10px; border-radius: 8px; font-size: 12px; text-align: center; margin-top: 8px; }
    .tip { font-size: 11px; color: #64748b; padding: 8px; background: rgba(0, 0, 0, 0.2); border-radius: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-row">
        <span>MDC 收益辅助系统</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 256 256">
          <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00d4ff"/>
            <stop offset="100%" style="stop-color:#0099cc"/>
          </linearGradient></defs>
          <circle cx="128" cy="128" r="120" fill="url(#g)" stroke="#006688" stroke-width="4"/>
          <text x="128" y="145" font-family="Arial" font-size="72" font-weight="bold" fill="#fff" text-anchor="middle">MDC</text>
        </svg>
      </div>
      <div class="sub-title">您的专属 Web3 管理系统</div>
    </div>

    <div class="card">
      <div class="card-title">💳 连接钱包</div>
      <button class="btn" id="connectBtn" onclick="connectWallet()">连接 MetaMask</button>
      <div id="walletArea" style="display:none;">
        <div class="info-grid">
          <div class="info-box"><label>账户地址</label><div class="value" id="walletAddress">-</div></div>
          <div class="info-box"><label>BNB 余额</label><div class="value" id="bnbBalance">-</div></div>
        </div>
        <div class="warning-bar" id="networkWarning" style="display:none;">⚠️ 请切换到 BSC 主网</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📊 余额信息</div>
      <div class="info-grid">
        <div class="info-box"><label>可领取 MDC</label><div class="value" id="claimable">-</div></div>
        <div class="info-box"><label>MDC 余额</label><div class="value" id="balance">-</div></div>
      </div>
      <div class="info-grid">
        <div class="info-box"><label>安全地址</label><div class="value" id="safeAddress">-</div></div>
        <div class="info-box"><label>Gas价格</label><div class="value" id="gasPrice">-</div></div>
      </div>
      <button class="btn btn-secondary" onclick="refreshBalances()" style="margin-top: 10px;">🔄 刷新链上数据</button>
    </div>

    <div class="card">
      <div class="card-title">📋 功能状态</div>
      <div class="status-table">
        <div class="status-row">
          <span class="icon">💳</span><span class="name">钱包连接</span>
          <span class="status error" id="statusWallet">❌ 未连接</span>
        </div>
        <div class="status-row">
          <span class="icon">🌐</span><span class="name">BSC 网络</span>
          <span class="status warning" id="statusNetwork">⏳ 检测中</span>
        </div>
        <div class="status-row">
          <span class="icon">🤖</span><span class="name">自动领取</span>
          <span class="status error" id="statusAuto">❌ 已停止</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">⚡ 操作</div>
      <div id="autoStatusArea" style="display:none;" class="auto-indicator">
        <div class="dot"></div><span>自动领取运行中</span>
      </div>
      <div class="action-row">
        <button class="btn btn-success" id="claimBtn" onclick="claimAndTransfer()">Claim合约领取MDC</button>
        <button class="btn btn-secondary" id="transferBtn" onclick="transferAll()">转账全部</button>
      </div>
      <div class="action-row">
        <button class="btn" id="autoBtn" onclick="toggleAuto()">启动自动</button>
        <button class="btn btn-danger" id="stopBtn" onclick="stopAuto()">停止</button>
      </div>
      <div class="log-list" id="logArea"></div>
    </div>

    <div class="card">
      <div class="card-title">🔒 安全设置</div>
      <input type="text" id="safeAddressInput" placeholder="输入安全地址">
      <button class="btn btn-secondary" onclick="saveSafeAddress()" style="margin-top: 8px;">保存地址</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
  <script>
    const CONFIG = {
      chainId: 56,
      MDC_TOKEN: '0xd1ba69a44888ee50819c554d3d6f4ee457622894',
      CLAIM_CONTRACT: '0xEc5DBf2BACe283143b7B4472a7ce0E445EDA3F1e',
      MIN_AMOUNT: 0.05,
      CHECK_INTERVAL: 30000,
    };
    
    const RPC_LIST = ['https://bsc-dataseed2.defibit.io/', 'https://bscrpc.com/', 'https://rpc.ankr.com/bsc'];
    
    const MDC_ABI = [
      { "constant": true, "inputs": [{ "name": "_owner", "type": "address" }], "name": "balanceOf", "outputs": [{ "name": "", "type": "uint256" }], "type": "function" },
      { "constant": false, "inputs": [{ "name": "to", "type": "address" }, { "name": "amount", "type": "uint256" }], "name": "transfer", "outputs": [{ "name": "", "type": "bool" }], "type": "function" }
    ];
    
    const CLAIM_ABI = [
      { "constant": true, "inputs": [{ "name": "account", "type": "address" }], "name": "claimable", "outputs": [{ "name": "", "type": "uint256" }], "type": "function" },
      { "constant": false, "inputs": [{ "name": "account", "type": "address" }], "name": "claim", "outputs": [], "type": "function" }
    ];
    
    let web3, currentAccount, safeAddress, autoInterval, isAutoRunning = false;
    
    async function init() {
      loadSafeAddress();
      if (typeof window.ethereum !== 'undefined') {
        web3 = new Web3(window.ethereum);
      } else {
        for (const rpc of RPC_LIST) {
          try {
            web3 = new Web3(new Web3.providers.HttpProvider(rpc));
            await web3.eth.getBlockNumber();
            break;
          } catch (e) {}
        }
      }
      try {
        const accounts = await window.ethereum.request({ method: 'eth_accounts' });
        if (accounts.length > 0) {
          currentAccount = accounts[0];
          updateWalletUI();
          await checkNetwork();
          await refreshBalances();
        }
      } catch (e) {}
    }
    
    function loadSafeAddress() {
      const saved = localStorage.getItem('mdc_safe_address');
      if (saved) {
        safeAddress = saved;
      } else {
        safeAddress = '0x8558D8A5b90eC7d9f500cdCF0FB49C47292EBCdA';
      }
      document.getElementById('safeAddressInput').value = safeAddress;
      document.getElementById('safeAddress').textContent = safeAddress.slice(0, 6) + '...' + safeAddress.slice(-4);
    }
    
    function saveSafeAddress() {
      const address = document.getElementById('safeAddressInput').value.trim();
      if (address && web3.utils.isAddress(address)) {
        safeAddress = address;
        localStorage.setItem('mdc_safe_address', address);
        document.getElementById('safeAddress').textContent = address.slice(0, 6) + '...' + address.slice(-4);
        showLog('安全地址已保存 ✓', 'success');
      } else {
        showLog('请输入有效的地址', 'error');
      }
    }
    
    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        showLog('请安装 MetaMask 钱包', 'error');
        return;
      }
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        currentAccount = accounts[0];
        updateWalletUI();
        await checkNetwork();
        await refreshBalances();
      } catch (e) {
        showLog('连接失败', 'error');
      }
    }
    
    async function checkNetwork() {
      try {
        const chainId = await web3.eth.getChainId();
        const warningEl = document.getElementById('networkWarning');
        const statusEl = document.getElementById('statusNetwork');
        if (chainId !== CONFIG.chainId) {
          warningEl.style.display = 'block';
          statusEl.className = 'status error';
          statusEl.textContent = '❌ 网络错误';
          setButtonsDisabled(true);
          try {
            await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x38' }] });
          } catch (e) {}
        } else {
          warningEl.style.display = 'none';
          statusEl.className = 'status success';
          statusEl.textContent = '✅ 已连接';
          setButtonsDisabled(false);
        }
      } catch (e) {}
    }
    
    function setButtonsDisabled(disabled) {
      ['claimBtn', 'autoBtn', 'transferBtn'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.disabled = disabled;
      });
    }
    
    function updateWalletUI() {
      document.getElementById('walletArea').style.display = 'block';
      document.getElementById('walletAddress').textContent = currentAccount.slice(0, 6) + '...' + currentAccount.slice(-4);
      document.getElementById('connectBtn').textContent = '已连接 ✓';
      document.getElementById('connectBtn').disabled = true;
      const statusWallet = document.getElementById('statusWallet');
      statusWallet.className = 'status success';
      statusWallet.textContent = '✅ 已连接';
      web3.eth.getBalance(currentAccount).then(balance => {
        document.getElementById('bnbBalance').textContent = (Number(balance) / 1e18).toFixed(4) + ' BNB';
      });
    }
    
    function formatAmount(wei, decimals = 18) {
      if (!wei) return '0';
      return (Number(wei) / Math.pow(10, decimals)).toFixed(4);
    }
    
    function showLog(msg, type = 'info') {
      const el = document.getElementById('logArea');
      const div = document.createElement('div');
      div.className = 'log-item';
      div.textContent = msg;
      if (type === 'success') div.style.color = '#22c55e';
      if (type === 'error') div.style.color = '#ef4444';
      el.insertBefore(div, el.firstChild);
      while (el.children.length > 5) el.removeChild(el.lastChild);
    }
    
    async function refreshBalances() {
      if (!currentAccount) return;
      const mdcContract = new web3.eth.Contract(MDC_ABI, CONFIG.MDC_TOKEN);
      const claimContract = new web3.eth.Contract(CLAIM_ABI, CONFIG.CLAIM_CONTRACT);
      try {
        const [claimable, balance, bnbBalance, gasPrice] = await Promise.all([
          claimContract.methods.claimable(currentAccount).call().catch(() => '0'),
          mdcContract.methods.balanceOf(currentAccount).call(),
          web3.eth.getBalance(currentAccount),
          web3.eth.getGasPrice(),
        ]);
        
        document.getElementById('claimable').textContent = formatAmount(claimable) + ' MDC';
        document.getElementById('balance').textContent = formatAmount(balance) + ' MDC';
        document.getElementById('gasPrice').textContent = (Number(gasPrice) / 1e9).toFixed(4) + ' Gwei';
        
        const bnbNum = Number(bnbBalance) / 1e18;
        
        document.getElementById('claimBtn').disabled = bnbNum < 0.001;
        document.getElementById('transferBtn').disabled = Number(balance) <= 0;
        
      } catch (e) {
        showLog('刷新失败', 'error');
      }
    }
    
    async function claimAndTransfer() {
      if (!currentAccount) return;
      document.getElementById('claimBtn').disabled = true;
      showLog('正在领取...', 'info');
      
      const claimContract = new web3.eth.Contract(CLAIM_ABI, CONFIG.CLAIM_CONTRACT);
      try {
        const tx = await claimContract.methods.claim(currentAccount).send({
          from: currentAccount, gas: 150000, gasPrice: '100000000'
        });
        showLog(`领取成功!`, 'success');
        await refreshBalances();
      } catch (e) {
        showLog('领取失败', 'error');
        document.getElementById('claimBtn').disabled = false;
      }
    }
    
    async function transferAll() {
      if (!currentAccount || !safeAddress) return;
      document.getElementById('transferBtn').disabled = true;
      showLog('正在转账...', 'info');
      
      const mdcContract = new web3.eth.Contract(MDC_ABI, CONFIG.MDC_TOKEN);
      try {
        const balance = await mdcContract.methods.balanceOf(currentAccount).call();
        if (Number(balance) <= 0) {
          showLog('余额为0', 'error');
          document.getElementById('transferBtn').disabled = false;
          return;
        }
        const tx = await mdcContract.methods.transfer(safeAddress, balance).send({
          from: currentAccount, gas: 100000, gasPrice: '100000000'
        });
        showLog(`转账成功!`, 'success');
        await refreshBalances();
      } catch (e) {
        showLog('转账失败', 'error');
        document.getElementById('transferBtn').disabled = false;
      }
    }
    
    async function toggleAuto() {
      if (isAutoRunning) { stopAuto(); return; }
      isAutoRunning = true;
      document.getElementById('autoStatusArea').style.display = 'flex';
      document.getElementById('autoBtn').disabled = true;
      document.getElementById('stopBtn').disabled = false;
      const statusAuto = document.getElementById('statusAuto');
      statusAuto.className = 'status success';
      statusAuto.textContent = '✅ 运行中';
      showLog('自动领取已启动', 'success');
      await autoCheck();
      autoInterval = setInterval(autoCheck, CONFIG.CHECK_INTERVAL);
    }
    
    function stopAuto() {
      isAutoRunning = false;
      clearInterval(autoInterval);
      document.getElementById('autoStatusArea').style.display = 'none';
      document.getElementById('autoBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      const statusAuto = document.getElementById('statusAuto');
      statusAuto.className = 'status error';
      statusAuto.textContent = '❌ 已停止';
      showLog('自动领取已停止', 'info');
    }
    
    async function autoCheck() {
      if (!isAutoRunning || !currentAccount) return;
      showLog('检查中...', 'info');
      try {
        const mdcContract = new web3.eth.Contract(MDC_ABI, CONFIG.MDC_TOKEN);
        const claimContract = new web3.eth.Contract(CLAIM_ABI, CONFIG.CLAIM_CONTRACT);
        const [claimable, balance] = await Promise.all([
          claimContract.methods.claimable(currentAccount).call().catch(() => '0'),
          mdcContract.methods.balanceOf(currentAccount).call(),
        ]);
        const total = (Number(claimable) + Number(balance)) / 1e18;
        if (total >= CONFIG.MIN_AMOUNT) {
          showLog('满足条件，领取中...', 'info');
          await claimAndTransfer();
          await new Promise(r => setTimeout(r, 2000));
          await transferAll();
        }
        await refreshBalances();
      } catch (e) {
        showLog('检查失败', 'error');
      }
    }
    
    if (window.ethereum) {
      window.ethereum.on('accountsChanged', (accounts) => {
        if (accounts.length > 0) {
          currentAccount = accounts[0];
          updateWalletUI();
          refreshBalances();
        } else {
          window.location.reload();
        }
      });
      window.ethereum.on('chainChanged', () => { window.location.reload(); });
    }
    
    init();
  </script>
</body>
</html>
